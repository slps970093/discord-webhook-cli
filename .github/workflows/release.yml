name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build TypeScript
        run: npm run build

      - name: Build executable
        run: npm run build:${{ matrix.os == 'ubuntu-latest' && 'linux' || matrix.os == 'windows-latest' && 'win' || 'mac' }}

      - name: Rename artifact
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv dist/discord-webhook.exe dist/discord-webhook-windows.exe
          elif [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            mv dist/discord-webhook dist/discord-webhook-linux
          else
            mv dist/discord-webhook dist/discord-webhook-macos
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: discord-webhook-${{ matrix.os }}
          path: dist/discord-webhook-*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: discord-webhook-*
          merge-multiple: false

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/discord-webhook-ubuntu-latest/discord-webhook-linux
            dist/discord-webhook-windows-latest/discord-webhook-windows.exe
            dist/discord-webhook-macos-latest/discord-webhook-macos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
