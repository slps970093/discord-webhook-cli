name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build TypeScript
        run: npm run build

      - name: Build executable
        run: npm run build:${{ matrix.os == 'ubuntu-latest' && 'linux' || matrix.os == 'windows-latest' && 'win' || 'mac' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: discord-webhook-${{ matrix.os }}
          path: dist/discord-webhook${{ matrix.os == 'windows-latest' && '.exe' || '' }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v3
        with:
          path: dist
          pattern: discord-webhook-*
          merge-multiple: false

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/discord-webhook-ubuntu-latest/discord-webhook
            dist/discord-webhook-windows-latest/discord-webhook.exe
            dist/discord-webhook-macos-latest/discord-webhook
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
